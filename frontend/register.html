<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#e8f5e9,#f4f7f6);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:35px;
  border-radius:20px;
  width:350px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  text-align:center;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  margin-bottom:20px;
}

.input-box{
  text-align:left;
  margin-bottom:12px;
}

.input-box label{
  font-size:13px;
  color:#555;
}

.input-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
  transition:0.2s;
}

.input-box input:focus{
  border-color:#2e7d32;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  background:#1b5e20;
}

button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

.loading{
  font-size:12px;
  margin-top:10px;
  color:#777;
}

.login{
  margin-top:15px;
  font-size:13px;
}

.login a{
  color:#2e7d32;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="card">

<h2>Daftar Akun</h2>

<div class="input-box">
  <label>Nama</label>
  <input id="name" placeholder="Nama lengkap">
</div>

<div class="input-box">
  <label>Email</label>
  <input id="email" placeholder="Email">
</div>

<div class="input-box">
  <label>Password</label>
  <input id="password" type="password" placeholder="Password">
</div>

<button id="btn" onclick="register()">Daftar Sekarang</button>

<div class="loading" id="loading"></div>

<div class="login">
  Sudah punya akun? <a href="index.html">Login</a>
</div>

</div>
<script src="assets/js/script.js"></script>
<script>
async function register() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    // UI Elements
    const btn = document.getElementById('btn');
    const loadingText = document.getElementById('loading');
    
    // 1. Basic Validation
    if (!name || !email || !password) {
        alert("Isi semua field!");
        return;
    }
    
    // Email regex validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        alert("Format email tidak valid!");
        return;
    }

    // Password length validation
    if (password.length < 6) {
        alert("Password minimal 6 karakter!");
        return;
    }

    // 2. UI Loading State
    btn.disabled = true;
    loadingText.innerText = "Mendaftarkan akun...";

    try {
        const res = await fetch('http://localhost:3000/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
            alert("Pendaftaran berhasil! Silakan login.");
            window.location.href = "index.html"; // Redirect ke login/home
        } else {
            // Menampilkan error dari backend (misal: email sudah terdaftar)
            alert(data.message || "Gagal mendaftar");
        }

    } catch (err) {
        console.error(err);
        alert("Server error, silakan coba lagi nanti.");
    } finally {
        // 3. Reset UI state
        btn.disabled = false;
        loadingText.innerText = "";
    }
}
</script>


</body>
</html>
