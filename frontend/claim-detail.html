<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Detail Klaim</title>

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f4f7f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.status{
  text-align:center;
  font-size:20px;
  margin-bottom:20px;
}

.pending{ color:orange; }
.approved{ color:green; }
.rejected{ color:red; }

.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<div id="status" class="status">Loading...</div>

<div class="row">
  <span>ID Klaim</span>
  <span id="id"></span>
</div>

<div class="row">
  <span>Polis</span>
  <span id="policy"></span>
</div>

<div class="row">
  <span>Status</span>
  <span id="statusText"></span>
</div>

<button onclick="window.location.href='history.html'">
  Kembali
</button>

</div>

<script>
async function loadClaim() {
    const claim_id = localStorage.getItem('claim_id');
    const token = localStorage.getItem('token'); // Gunakan token JWT
    const statusEl = document.getElementById('status');

    // Mapping status untuk clean code
    const statusConfig = {
        'pending': { text: "⏳ Menunggu Verifikasi", class: "pending" },
        'approved': { text: "✅ Klaim Disetujui", class: "approved" },
        'rejected': { text: "❌ Klaim Ditolak", class: "rejected" }
    };

    try {
        const res = await fetch(`http://localhost:3000/claims/${claim_id}`, {
            headers: {
                'Authorization': `Bearer ${token}` // Middleware auth akan mengecek ini
            }
        });

        if (!res.ok) throw new Error("Gagal mengambil data");
        const data = await res.json();

        // Update DOM
        document.getElementById('id').innerText = data.id;
        document.getElementById('policy').innerText = data.policy_id;
        document.getElementById('statusText').innerText = data.status;

        // Terapkan status
        const config = statusConfig[data.status] || { text: "Status Tidak Diketahui", class: "" };
        statusEl.innerText = config.text;
        statusEl.className = `status ${config.class}`;

    } catch (err) {
        console.error(err);
        statusEl.innerText = "❌ Gagal memuat data";
        statusEl.className = "status rejected";
    }
}

loadClaim();
</script>

</body>
</html>
